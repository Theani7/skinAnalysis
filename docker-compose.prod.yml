version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:${TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_results:/app/results
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - MODEL_PATH=model/model.h5
      - SKINAI_JWT_SECRET=${SKINAI_JWT_SECRET}
      - SKINAI_DB_PATH=/app/skinai.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:${TAG:-latest}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_results:
