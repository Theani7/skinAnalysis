services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:${TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_results:/app/results
    env_file:
      - .env
    environment:
      - SKINAI_CORS_ORIGINS=${SKINAI_CORS_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:${TAG:-latest}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

volumes:
  backend_uploads:
  backend_results:
